name: Todo Check

on:
    pull_request:
      types: [opened, synchronize, reopened]
    workflow_dispatch:

jobs:
    todo-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Run vibed-todo-action
              uses: Mikolaj-A-Kowalski/vibed-todo-action@master
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                todo-pattern: 'TODO'
                comment-prefix: 'Please fix me before merging'
